site_name: "AI Models: Performance, Capabilities, Accuracy, Speed, Energy Use, and Token Economics"
site_description: >-
  A technical reference, comparative research survey, and reproducible
  evaluation framework covering contemporary proprietary and open-weight
  AI model families. Research cut-off 2026-07-22.
site_author: Ethical Tech CoLab
site_url: https://ethical-tech-colab.github.io/AI-Models-Research/

repo_name: Ethical-Tech-CoLab/AI-Models-Research
repo_url: https://github.com/Ethical-Tech-CoLab/AI-Models-Research
edit_uri: edit/main/docs/

copyright: >-
  Documentation and data are licensed CC BY 4.0. Code is licensed MIT.
  Rankings, prices, and model availability change without notice; see the
  disclaimer in the README.

docs_dir: docs
site_dir: site
strict: true

theme:
  name: material
  language: en
  favicon: assets/etc-icon.svg
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.tabs.link
    - content.footnote.tooltips
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

plugins:
  - search:
      lang: en

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Ethical-Tech-CoLab
      name: Ethical Tech CoLab on GitHub
  generator: false

# Files at the repository root (README, methodology, limitations, glossary,
# data sources, contributing) live outside docs_dir and are linked to GitHub
# rather than copied, so that a single canonical copy exists.
