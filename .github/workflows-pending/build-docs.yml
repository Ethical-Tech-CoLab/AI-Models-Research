name: Build documentation

# Builds the MkDocs site in strict mode. A warning is treated as a failure, so
# a file present in the navigation but missing from disk, or present on disk
# but missing from the navigation, blocks the merge.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: mkdocs build --strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build
        run: mkdocs build --strict

      - name: Upload the built site
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: site/
          retention-days: 7
